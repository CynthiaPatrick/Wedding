<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cynthia & Patrick — Wedding Countdown</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Raleway:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --white:#ffffff;
      --ivory:#fffdf6;
      --gold:#d4af37;
      --gold-soft:#e8d28f;
      --green:#2e7d32;
      --lemon:#ffd84d;
      --shadow: 0 18px 55px rgba(0,0,0,.12);
      --shadow-soft: 0 8px 22px rgba(0,0,0,.10);
    }
    html,body{
      height:100%;
      margin:0;
      background:
        radial-gradient(1200px 1200px at 80% -10%, rgba(212,175,55,.10), transparent 60%),
        radial-gradient(1000px 1000px at 10% 110%, rgba(46,125,50,.08), transparent 60%),
        var(--ivory);
      color:#2b2b2b;
      font-family: "Raleway", system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    }
    .wrap{
      min-height:100%;
      display:grid;
      place-items:center;
      padding:24px;
      perspective: 1400px;
    }

    .card{
      position:relative;
      width:min(920px, 92vw);
      border-radius:28px;
      background:linear-gradient(180deg, #ffffff, #fffdf6);
      box-shadow: var(--shadow);
      overflow:clip;
      border:1px solid rgba(212,175,55,.45);
      transform-style: preserve-3d;
      transition: transform .6s cubic-bezier(.2,.8,.2,1), box-shadow .6s ease;
    }
    .card::before{
      content:"";
      position:absolute; inset:0 0 auto 0; height:10px;
      background: linear-gradient(90deg, var(--gold) 0%, var(--gold-soft) 50%, var(--gold) 100%);
      opacity:.95;
      z-index:2;
    }
    .card .rim{
      pointer-events:none;
      position:absolute; inset:0;
      border-radius:28px;
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,.9),
        inset 0 -2px 0 rgba(208,171,50,.18),
        inset 0 0 0 1.5px rgba(212,175,55,.35);
      z-index:1;
    }
    .card .lift{
      position:absolute; inset:auto 28px -18px 28px; height:36px;
      background: radial-gradient(60% 100% at 50% 0%, rgba(0,0,0,.16), transparent 70%);
      filter: blur(10px);
      border-radius:24px;
      z-index:0;
    }
    .card .sheen{
      position:absolute; inset:0;
      background: linear-gradient(115deg, rgba(255,255,255,.0) 35%, rgba(255,255,255,.28) 48%, rgba(255,255,255,.0) 62%);
      mix-blend-mode: screen;
      pointer-events:none;
      opacity:.35;
      z-index:1;
    }
    .card:hover{
      transform: rotateX(2deg) rotateY(-2.5deg) translateZ(2px);
      box-shadow: 0 25px 60px rgba(0,0,0,.18);
    }
    .inner{
      position:relative;
      z-index:3;
      padding:60px clamp(18px, 4vw, 56px) 48px;
    }
    header{
      display:flex; align-items:center; justify-content:center; gap:14px; margin-bottom:18px;
    }

    /* Title Styling */
    h1{
      margin:0;
      text-align:center;
      font-family: "Cormorant Garamond", serif;
      font-weight:600;
      letter-spacing:.5px;
      font-size: clamp(32px, 5vw, 52px);
      color:#1c1c1c;
      text-shadow: 0 1px 0 rgba(255,255,255,.6);
    }
    h1 .amp{
      font-weight:500;
      font-style:italic;
      color:var(--gold);
      padding:0 6px;
      font-size:1.1em;
      vertical-align:baseline;
    }

    .subtitle{
      text-align:center; margin:8px 0 32px; font-weight:500; color:#3a3a3a;
    }

    .countdown{
      display:grid; grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap:16px; margin: 0 auto 28px; width:min(760px, 100%);
    }
    .unit{
      border:1px solid rgba(212,175,55,.35);
      background:linear-gradient(180deg, #ffffff, #fffaf0);
      border-radius:20px; padding:18px 16px;
      text-align:center;
      box-shadow: var(--shadow-soft);
      position:relative;
    }
    .unit::after{
      content:""; position:absolute; inset:0 0 auto 0; height:8px;
      border-radius:20px 20px 0 0;
      background: linear-gradient(180deg, rgba(255,255,255,.9), rgba(255,255,255,0));
    }
    .value{
      display:block;
      font-family:"Cormorant Garamond", serif;
      font-size: clamp(34px, 6vw, 48px);
      line-height:1;
      margin-bottom:8px;
      background: linear-gradient(180deg, #5b4b00, #b08b12);
      -webkit-background-clip:text; background-clip:text; color:transparent;
      text-shadow: 0 1px 0 rgba(255,255,255,.6);
    }
    .label{
      text-transform:uppercase; letter-spacing:2px; font-size:12px; color:#5e5e5e;
    }

    .divider{
      display:flex; align-items:center; justify-content:center; gap:16px; margin: 36px 0 18px;
      color: rgba(46,125,50,.9);
    }
    .divider .line{
      height:1px; width:140px; background: linear-gradient(90deg, transparent, rgba(46,125,50,.25), transparent);
    }
    .lemon{
      width:26px; height:26px; display:inline-block;
      background:
        radial-gradient(circle at 30% 30%, #fff6a1 15%, transparent 40%),
        radial-gradient(circle at 70% 70%, #ffe46b 10%, transparent 35%),
        var(--lemon);
      border-radius:50% 58% 46% 52% / 48% 44% 56% 52%;
      border:2px solid #e0b000;
      box-shadow: 0 2px 6px rgba(0,0,0,.08);
      position:relative;
    }
    .lemon::after{
      content:"";
      position:absolute; top:-6px; left:8px; width:12px; height:12px; border-radius:0 100% 0 100%;
      background: var(--green);
      transform: rotate(20deg);
    }

    .details{
      margin-top:16px;
      text-align:center;
      font-weight:700;
      letter-spacing:.8px;
      color:#1e1e1e;
      font-size: clamp(18px, 3vw, 20px);
    }
    .details .flag{
      display:inline-flex; align-items:center; gap:10px;
      padding:12px 18px;
      border:1.5px solid rgba(212,175,55,.65);
      background: linear-gradient(180deg, #ffffff, #fff9e9);
      border-radius:14px;
      box-shadow: 0 8px 22px rgba(0,0,0,.06), inset 0 1px 0 rgba(255,255,255,.7);
    }
    .details .pulse{
      width:10px; height:10px; border-radius:50%;
      background: #d4af37;
      box-shadow: 0 0 0 0 rgba(212,175,55,.6);
      animation: pulse 1.8s ease-out infinite;
    }
    @keyframes pulse{
      0%   { box-shadow: 0 0 0 0 rgba(212,175,55,.6); }
      70%  { box-shadow: 0 0 0 10px rgba(212,175,55,0); }
      100% { box-shadow: 0 0 0 0 rgba(212,175,55,0); }
    }

    footer{
      padding: 24px clamp(18px, 4vw, 56px) 36px;
      display:flex; justify-content:center; gap:10px; flex-wrap:wrap;
      color:#5a5a5a; font-size:14px;
    }
    .pill{
      border-radius:999px; padding:10px 14px; display:inline-flex; align-items:center; gap:8px;
      border:1px solid rgba(212,175,55,.35);
      background: linear-gradient(180deg, #fff, #fffaf2);
      box-shadow: 0 6px 16px rgba(0,0,0,.06);
    }
    .dot{
      width:8px; height:8px; border-radius:50%; background: var(--green);
    }
    @media (max-width:680px){
      .countdown{ grid-template-columns: repeat(2, 1fr); }
    }
    .fade-in{opacity:0; transform: translateY(8px); animation: fadeUp .9s ease .05s forwards;}
    @keyframes fadeUp{to{opacity:1; transform:none;}}
  </style>
</head>
<body>
  <div class="wrap">
    <main class="card fade-in" role="main" aria-labelledby="title">
      <span class="rim" aria-hidden="true"></span>
      <span class="sheen" aria-hidden="true"></span>
      <span class="lift" aria-hidden="true"></span>

      <div class="inner">
        <header>
          <h1 id="title">Cynthia <span class="amp">&amp;</span> Patrick Wedding</h1>
        </header>

        <p class="subtitle">Counting down to our wedding celebration — <strong>April 11, 2026 at 12:00</strong></p>

        <section class="countdown" aria-label="Countdown timer">
          <div class="unit"><span class="value" id="days">–</span><span class="label">Days</span></div>
          <div class="unit"><span class="value" id="hours">–</span><span class="label">Hours</span></div>
          <div class="unit"><span class="value" id="minutes">–</span><span class="label">Minutes</span></div>
          <div class="unit"><span class="value" id="seconds">–</span><span class="label">Seconds</span></div>
        </section>

        <div class="divider" aria-hidden="true">
          <span class="line"></span><span class="lemon"></span><span class="line"></span>
        </div>

        <p class="details">
          <span class="flag">
            <span class="pulse" aria-hidden="true"></span>
            More details coming soon
          </span>
        </p>
      </div>

      <!-- <footer> -->
        <!-- <span class="pill"><span class="dot" aria-hidden="true"></span> Venue announcement to follow</span> -->
        <!-- <span class="pill"><span class="dot" aria-hidden="true"></span> Dress code: Italian summer chic</span> -->
      <!-- </footer> -->
    </main>
  </div>

  <script>
    const target = new Date('2026-04-11T12:00:00').getTime();
    const el = {
      days: document.getElementById('days'),
      hours: document.getElementById('hours'),
      minutes: document.getElementById('minutes'),
      seconds: document.getElementById('seconds'),
    };
    function pad(n){ return n.toString().padStart(2,'0'); }
    function tick(){
      const now = Date.now();
      let diff = Math.max(0, target - now);
      const days = Math.floor(diff / (1000*60*60*24)); diff -= days * (1000*60*60*24);
      const hours = Math.floor(diff / (1000*60*60)); diff -= hours * (1000*60*60);
      const minutes = Math.floor(diff / (1000*60)); diff -= minutes * (1000*60);
      const seconds = Math.floor(diff / 1000);
      el.days.textContent = days;
      el.hours.textContent = pad(hours);
      el.minutes.textContent = pad(minutes);
      el.seconds.textContent = pad(seconds);
      if (target - now <= 0) {
        clearInterval(timer);
        document.querySelector('.subtitle').textContent = "It's time to celebrate!";
      }
    }
    tick();
    const timer = setInterval(tick, 1000);
  </script>
</body>
</html>
