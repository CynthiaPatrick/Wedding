<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Einladung</title>
    <style>
      :root {
        color-scheme: light;
        --page-bg: #fffdf2;
        --frame: #f0e7c8;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--page-bg);
      }

      body {
        font-family: "Georgia", "Times New Roman", serif;
        display: flex;
        justify-content: center;
      }

      .wrap {
        width: min(1200px, 96vw);
        padding: 24px 0 48px;
      }

      .card {
        background: #ffffff;
        border: 1px solid var(--frame);
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.08);
        border-radius: 14px;
        overflow: hidden;
      }

      .card img {
        display: block;
        width: 100%;
        height: auto;
      }

      .note {
        text-align: center;
        font-size: 14px;
        color: #7a6f55;
        margin: 14px 0 0;
      }

      .note a {
        color: inherit;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <img src="Einladung.svg" alt="Einladung">
      </section>
      <p class="note">
        Falls das SVG nicht geladen wird, kannst du es direkt öffnen:
        <a href="Einladung.svg">Einladung.svg</a>
      </p>
    </main>
  </body>
</html>
